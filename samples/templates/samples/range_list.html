{% extends "home/layout.html" %}
{% load form_tags %}
{% load static %}

{% block css %}
	<link rel="stylesheet" href='{% static "home/vendor/datatables/media/css/dataTables.jqueryui.min.css" %}'>
{% endblock %}

{% block js %}
	<script type="text/javascript" src='{% static "home/vendor/datatables/media/js/jquery.dataTables.js" %}'></script>
{% endblock %}

{% block content %}	

<div class="page-title">Range List</div>

<div class="panel panel-default">
	
	<div class="table-resonsive">
		<table class='table table-bordered table-striped table table-condensed' id='range_list_table'>
			<thead>
				<tr>
					<th>Year Month</th>
					<th>Starting Envelope</th>
					<th>Last Envelope</th>
					<th>Sample type</th>
					<th>Accessioned By</th>
					<th>Accessioned At</th>
					<th>Entered By</th>
					<th></th>
				</tr>
			</thead>
		</table>
	</div>
	
</div>
<script type="text/javascript">
	$(document).ready(function() {	
		$(".status").hide();
        $(".comments").hide();

		 var table = $('#range_list_table').dataTable({
			"processing": true,
			"serverSide": true,
			"order": [[ 1, "desc" ]],
			"ajax": "/samples/range_json/",
		});
	
	});
	
</script>
{% endblock %}
