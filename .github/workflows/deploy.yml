name: Build & Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify static assets exist
        run: |
          test -f static/home/vendor/bootstrap/dist/js/bootstrap.min.js
          test -f static/home/vendor/jquery/dist/jquery.min.js

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            bokello/hepb:latest
            bokello/hepb:${{ github.sha }}
