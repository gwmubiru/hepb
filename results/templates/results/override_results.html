{% extends "home/layout.html" %}
{% load form_tags %}
{% load static %}

{% block js %}
	<script type="text/javascript" src='{% static "home/vendor/moment/min/moment.min.js" %}'></script>
	<script type="text/javascript" src='{% static "home/vendor/combodate/src/combodate.js" %}'></script>
{% endblock %}

{% block content %}	
	<span class="page-title">Upload results</span>		
	<div class="panel panel-default">
		<div class="panel-body">
			
			<form action="{% url 'results:override_results' %}" method="post" role="form" enctype="multipart/form-data">
				{% csrf_token %}
				<div class="form-group">
					{{ form.results_file.label_tag}}
					{{ form.results_file.errors}}
					{{ form.results_file }}
				</div>	
				{{ form.worksheet }}			

				<input type="submit" value="Upload" class="btn btn-danger btn-submit ">
				
			</form>
		</div>
	</div>
	<script type="text/javascript">
	$('#id_multiplier').addClass('hidden');

	</script>
{% endblock %}
